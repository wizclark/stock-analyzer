services:
  - type: web
    name: stock-analyzer
    env: python
    buildCommand: "apt-get update && apt-get install -y fonts-wqy-microhei fonts-noto-cjk || true && pip install -r requirements.txt"
    startCommand: "python app.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13
      - key: FLASK_ENV
        value: production
