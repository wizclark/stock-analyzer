<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 — StockAnalyzer</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="navbar">
    <div class="nav-inner">
        <a class="nav-brand" href="/">StockAnalyzer</a>
        <div class="nav-links">
            <a href="/register" class="nav-btn">注册</a>
        </div>
    </div>
</nav>
<div class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">欢迎回来</h1>
        <p class="auth-subtitle">登录以保存分析历史和 PDF 记录</p>
        <form onsubmit="doLogin(event)">
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input class="form-input" type="text" id="username" placeholder="输入用户名" required autocomplete="username">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input class="form-input" type="password" id="password" placeholder="输入密码" required autocomplete="current-password">
            </div>
            <div class="form-error" id="loginError"></div>
            <button class="form-btn" type="submit">登录</button>
        </form>
        <p class="form-link">还没有账号？<a href="/register">立即注册</a></p>
    </div>
</div>
<script>
async function doLogin(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('loginError');
    errEl.textContent = '';
    if (!username || !password) { errEl.textContent = '请填写用户名和密码'; return; }
    try {
        const resp = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await resp.json();
        if (data.success) {
            window.location.href = '/';
        } else {
            errEl.textContent = data.error || '登录失败，请检查用户名和密码';
        }
    } catch (err) {
        errEl.textContent = '网络错误，请重试';
    }
}
</script>
</body>
</html>
