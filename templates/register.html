<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册 — StockAnalyzer</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="navbar">
    <div class="nav-inner">
        <a class="nav-brand" href="/">StockAnalyzer</a>
        <div class="nav-links">
            <a href="/login" class="nav-link">登录</a>
        </div>
    </div>
</nav>
<div class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">创建账号</h1>
        <p class="auth-subtitle">注册后可保存分析历史和 PDF 导出记录</p>
        <form onsubmit="doRegister(event)">
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input class="form-input" type="text" id="username" placeholder="3-20个字符" required minlength="3" maxlength="20" autocomplete="username">
            </div>
            <div class="form-group">
                <label class="form-label">邮箱（可选）</label>
                <input class="form-input" type="email" id="email" placeholder="用于找回密码" autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input class="form-input" type="password" id="password" placeholder="至少6个字符" required minlength="6" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label class="form-label">确认密码</label>
                <input class="form-input" type="password" id="password2" placeholder="再次输入密码" required autocomplete="new-password">
            </div>
            <div class="form-error" id="regError"></div>
            <button class="form-btn" type="submit">注册</button>
        </form>
        <p class="form-link">已有账号？<a href="/login">立即登录</a></p>
    </div>
</div>
<script>
async function doRegister(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;
    const errEl = document.getElementById('regError');
    errEl.textContent = '';
    if (password !== password2) { errEl.textContent = '两次密码不一致'; return; }
    try {
        const resp = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
        });
        const data = await resp.json();
        if (data.success) {
            window.location.href = '/';
        } else {
            errEl.textContent = data.error || '注册失败，请重试';
        }
    } catch (err) {
        errEl.textContent = '网络错误，请重试';
    }
}
</script>
</body>
</html>
